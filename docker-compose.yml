services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: invest
      POSTGRES_USER: invest
      POSTGRES_PASSWORD: investpass
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: changeme
      DEBUG: "1"
      POSTGRES_DB: invest
      POSTGRES_USER: invest
      POSTGRES_PASSWORD: investpass
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    command: sh -c "python wait_for_postgres.py && python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  db_data:
